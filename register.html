<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Înregistrare | Event Planner</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/pages/auth.css" />
  </head>
  <body class="auth-body">

    <div class="auth-container">

      <!-- Logo -->
      <div class="auth-logo">
        <h1>Event Planner</h1>
        <p>Plan your perfect event</p>
      </div>

      <!-- Card -->
      <div class="auth-card">
        <h2>Creează cont</h2>
        <p class="auth-subtitle">Începe să planifici evenimentul perfect</p>

        <!-- Alerts -->
        <div class="alert alert-error" id="errorMsg" style="display:none;"></div>
        <div class="alert alert-success" id="successMsg" style="display:none;"></div>

        <!-- Form -->
        <div class="form-group">
          <label for="username">Nume</label>
          <input
            type="text"
            id="username"
            placeholder="Numele tău"
            autocomplete="name"
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="your@email.com"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Parolă</label>
          <input
            type="password"
            id="password"
            placeholder="Min 8 caractere, 1 majusculă, 1 cifră"
            autocomplete="new-password"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmă Parola</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="Repetă parola"
            autocomplete="new-password"
          />
        </div>

        <button class="btn btn-primary btn-full" id="registerBtn">
          Creează cont
        </button>

        <p class="auth-footer">
          Ai deja un cont?
          <a href="/login.html">Autentifică-te</a>
        </p>
      </div>

    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
      // Redirect if already logged in
      if (isAuthenticated()) {
        globalThis.location.href = "/app/dashboard.html";
      }

      const registerBtn = document.getElementById("registerBtn");
      const errorMsg = document.getElementById("errorMsg");
      const successMsg = document.getElementById("successMsg");

      const showError = (message) => {
        errorMsg.textContent = message;
        errorMsg.style.display = "block";
        successMsg.style.display = "none";
      };

      const showSuccess = (message) => {
        successMsg.textContent = message;
        successMsg.style.display = "block";
        errorMsg.style.display = "none";
      };

      const hideAlerts = () => {
        errorMsg.style.display = "none";
        successMsg.style.display = "none";
      };

      const setLoading = (loading) => {
        registerBtn.disabled = loading;
        registerBtn.textContent = loading ? "Se creează contul..." : "Creează cont";
      };

      registerBtn.addEventListener("click", async () => {
        hideAlerts();

        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        // Validation
        if (!username || !email || !password || !confirmPassword) {
          showError("Completează toate câmpurile");
          return;
        }

        if (password !== confirmPassword) {
          showError("Parolele nu se potrivesc");
          return;
        }

        if (password.length < 8) {
          showError("Parola trebuie să aibă cel puțin 8 caractere");
          return;
        }

        setLoading(true);

        try {
          await auth.register(username, email, password);
          showSuccess("Cont creat! Redirecționare către autentificare...");
          setTimeout(() => {
            globalThis.location.href = "/login.html";
          }, 1500);
        } catch (error) {
          showError(error.message);
        } finally {
          setLoading(false);
        }
      });

      // Allow Enter key to submit
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") registerBtn.click();
      });
    </script>

  </body>
</html>
